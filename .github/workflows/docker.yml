name: docker

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-images:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target:
          - { name: opendesk-api, context: api }
          - { name: opendesk-admin, context: admin }
          - { name: opendesk-builder, context: builder }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.target.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.target.context }}
          push: false
          tags: ${{ matrix.target.name }}:ci

